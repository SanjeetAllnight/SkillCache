<div>

</div>
</div>
<div class="flex items-center gap-3">

</div>
<span class="text-[10px] font-medium text-stone-400 uppercase tracking-tighter">Options</span>
</button>

<button class="flex flex-col items-center gap-1 group">
<div class="w-16 h-14 rounded-full bg-error hover:bg-red-700 flex items-center justify-center transition-all group-active:scale-95 px-6">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">call_end</span>
</div>
<span class="text-[10px] font-medium text-error uppercase tracking-tighter">End Call</span>
